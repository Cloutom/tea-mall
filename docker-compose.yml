version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tea-mall-db
    environment:
      POSTGRES_USER: teaadmin
      POSTGRES_PASSWORD: teapassword123
      POSTGRES_DB: tea_mall
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tea-mall-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U teaadmin -d tea_mall']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tea-mall-backend
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://teaadmin:teapassword123@postgres:5432/tea_mall
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tea-mall-network
    command: npm run dev

  seller-web:
    build:
      context: ./seller-web
      dockerfile: Dockerfile
    container_name: tea-mall-seller-web
    ports:
      - '3001:3001'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    volumes:
      - ./seller-web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - tea-mall-network
    command: npm run dev

  consumer-web:
    build:
      context: ./consumer-web
      dockerfile: Dockerfile
    container_name: tea-mall-consumer-web
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_TOSS_CLIENT_KEY: test_ck_D5GePWvyJnrK0W0k6q8gLzN97Eon
    volumes:
      - ./consumer-web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - tea-mall-network
    command: npm run dev

networks:
  tea-mall-network:
    driver: bridge

volumes:
  postgres_data:
